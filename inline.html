<!DOCTYPE html>
<html>
    <head>
        <title>inline</title>
    </head>
    <style>
        .block-box{
            display:block;
            background-color: rgba(179, 195, 4, 0.319);
            border: 2px solid black;
            padding: 20px;
            margin: 10px;
        }
        .inline-box{
            display: inline;
            border: 2px solid red;
            padding: 10px; 
            margin: 10px;
            background-color: blue;

        

        }

        .inline-block-box{
            display: inline-block;
            width: 150px;
            border: 2px solid blue;
            padding: auto;
            margin: 10px;
        }
    </style>
    <body>
        <div class="block-box">BLOCK ELEMENT</div>
        <div class="inline-box">INLINE</div>
        <div class="inline-box">INLINE 2 </div>
        <div class="inline-block-box">CARD</div>
        <div class="inline-block-box">CARD1</div>
        <div class="inline-block-box">CARD2</div>
    </body>
