<!DOCTYPE html>
<html>
    <head>
        <title> flexbox example </title>
        <style>
            .container{
                display: flex;
                flex-direction: row;
                justify-content: flex-start;
                align-items: center;
                gap:20px;
                height: 300px;
                border: 2px solid black;

            }
            .box{
                width: 100px;
                height: 100px;
                background-color: lightblue;
                border: 1px solid black;
                text-align: center;
                line-height: 100px;
                font-size: 20px;
                font-weight: bold;
            }
            </style>
            </head>
            <body>
                <h2>FLEX BOX EXAMPLE</h2>
                <div class="container">
                    <div class="box">1</div>
                    <div class="box">2</div>
                    <div class="box">3</div>
                    <div class="box">1</div>
                    <div class="box">2</div>
                    <div class="box">3</div>
                    </div>
                </body>
                </html>
